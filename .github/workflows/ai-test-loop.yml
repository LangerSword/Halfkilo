name: AI Test Loop

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches-ignore: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-test-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Compose
        run: |
          echo "Docker available: $(docker --version)"
          echo "Docker Compose available: $(docker compose version)"

      - name: Run AI test-fix loop
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
        run: |
          docker compose -f lemon-compose.yml up --build --abort-on-container-exit --exit-code-from lemon

      - name: Create Pull Request with generated tests
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_BRANCH: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          git config user.name "lemonx[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}

          git add -A src/__tests__/ tests/integration/ tests/e2e/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No new test files generated — skipping PR creation"
            exit 0
          fi

          BRANCH="lemon/test-fix-$(date +%s)"
          git checkout -b "$BRANCH"
          git commit -m "lemon: auto-generated tests + fixes for ${CURRENT_BRANCH}"
          git push origin "$BRANCH"

          cat > /tmp/pr-body.md << EOF
          ## Lemon AI Test Report

          **Branch:** ${CURRENT_BRANCH}
          **Commit:** ${COMMIT_SHA}

          ### What happened
          The lemonx AI test-fix loop ran against this branch, generated vitest
          unit, integration, and E2E tests, iterated until all tests passed,
          and committed the resulting test files here.

          ### Test Results
          All tests passed

          Auto-generated by [lemonx](https://github.com/spirizeon/lemonx)
          EOF

          gh pr create \
            --title "lemon: auto-generated tests for ${CURRENT_BRANCH}" \
            --body-file /tmp/pr-body.md \
            --base "${CURRENT_BRANCH}" \
            --head "$BRANCH"

      - name: Cleanup
        if: always()
        run: docker compose -f lemon-compose.yml down -v
